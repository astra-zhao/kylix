name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target.os }}/${{ matrix.target.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { os: linux,   arch: amd64 }
          - { os: linux,   arch: arm64 }
          - { os: darwin,  arch: amd64 }
          - { os: darwin,  arch: arm64 }
          - { os: windows, arch: amd64 }

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build
        env:
          GOOS:   ${{ matrix.target.os }}
          GOARCH: ${{ matrix.target.arch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -ldflags="-s -w" \
            -o "kylix-${GOOS}-${GOARCH}${ext}" \
            ./cmd/kylix/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kylix-${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: kylix-${{ matrix.target.os }}-${{ matrix.target.arch }}*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Extract release notes
        id: notes
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          # Take the section from CHANGELOG between this tag's heading and the next ##
          awk -v tag="$tag" '
            /^## / { if (found) exit; if ($0 ~ tag) { found=1; next } }
            found { print }
          ' CHANGELOG.md > release_notes.md
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: Kylix ${{ steps.notes.outputs.tag }}
          body_path: release_notes.md
          files: release/*
          draft: false
          prerelease: false
