name: Registry

on:
  push:
    branches: [main]
    paths: ["registry/**", "go.mod", "go.sum"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run registry tests
        run: go test ./registry/...

      - name: Build binary
        run: go build -o /tmp/kylix-registry ./registry/cmd/registry/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: registry/deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-registry:${{ github.sha }}
            ghcr.io/${{ github.repository }}-registry:latest