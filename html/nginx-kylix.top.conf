# =============================================================================
# Nginx config for kylix.top
# Target: Ubuntu 22.04, Nginx (apt install nginx)
# Path: /etc/nginx/conf.d/kylix.top.conf
# =============================================================================

server {
    listen 80;
    server_name kylix.top www.kylix.top;

    root /var/www/kylix;
    index index.html;

    # ---- Security headers (good for SEO & safety) ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- robots.txt & sitemap ----
    location = /robots.txt {
        alias /var/www/kylix/robots.txt;
        add_header Content-Type "text/plain";
    }
    location = /sitemap.xml {
        alias /var/www/kylix/sitemap.xml;
        add_header Content-Type "application/xml";
    }

    # ---- Static assets: long cache ----
    location ~* \.(css|js|png|jpg|svg|ico|woff2?|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ---- Markdown docs: serve as plain text ----
    location ~* \.md$ {
        add_header Content-Type "text/plain; charset=utf-8";
        expires 1d;
    }

    # ---- HTML: no cache (so updates appear immediately) ----
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ---- Main location ----
    location / {
        try_files $uri $uri/ =404;
    }

    # ---- Gzip compression ----
    gzip on;
    gzip_types text/html text/css application/javascript text/markdown text/plain application/xml;
    gzip_min_length 512;
    gzip_comp_level 6;
}
