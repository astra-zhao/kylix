<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kylix Package Registry</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    .package-card:hover { border-color: #6366f1; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- Header -->
  <header class="bg-indigo-700 text-white shadow">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-2xl font-bold tracking-tight">kylix</span>
        <span class="text-indigo-300 text-sm">package registry</span>
      </div>
      <nav class="flex gap-4 text-sm">
        <a href="/" class="hover:text-indigo-200">Home</a>
        <a href="/packages" class="hover:text-indigo-200">Packages</a>
        <a href="/docs" class="hover:text-indigo-200">Docs</a>
      </nav>
    </div>
  </header>

  <!-- Hero -->
  <section class="bg-indigo-600 text-white py-12">
    <div class="max-w-5xl mx-auto px-4 text-center">
      <h1 class="text-3xl font-bold mb-3">Find Kylix Packages</h1>
      <p class="text-indigo-200 mb-6">The official package registry for the Kylix programming language</p>
      <div class="max-w-xl mx-auto">
        <input
          type="text"
          id="search"
          placeholder="Search packages..."
          class="w-full px-4 py-3 rounded-lg text-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
          hx-get="/api/v1/packages"
          hx-trigger="keyup changed delay:300ms"
          hx-target="#package-list"
          hx-include="[name='q']"
          name="q"
        />
      </div>
    </div>
  </section>

  <!-- Stats bar -->
  <div class="bg-white border-b">
    <div class="max-w-5xl mx-auto px-4 py-3 flex gap-8 text-sm text-gray-600">
      <span id="pkg-count">Loading packages...</span>
      <span>Free & open source</span>
      <span>MIT License</span>
    </div>
  </div>

  <!-- Package list -->
  <main class="max-w-5xl mx-auto px-4 py-8">
    <div
      id="package-list"
      hx-get="/api/v1/packages"
      hx-trigger="load"
      hx-swap="innerHTML"
    >
      <div class="text-center text-gray-400 py-12">Loading packages...</div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t mt-16 py-8 text-center text-sm text-gray-500">
    <p>Kylix Package Registry — <a href="https://kylix.top" class="text-indigo-600 hover:underline">kylix.top</a></p>
    <p class="mt-1">
      <code class="bg-gray-100 px-2 py-0.5 rounded text-xs">kylix install &lt;package&gt;</code>
    </p>
  </footer>

  <script>
    // Render package list from HTMX JSON response
    document.addEventListener('htmx:afterRequest', function(evt) {
      if (!evt.detail.pathInfo?.requestPath?.startsWith('/api/v1/packages')) return;
      const resp = JSON.parse(evt.detail.xhr.responseText);
      const pkgs = resp.packages || [];

      document.getElementById('pkg-count').textContent =
        pkgs.length + ' package' + (pkgs.length !== 1 ? 's' : '');

      const list = document.getElementById('package-list');
      if (pkgs.length === 0) {
        list.innerHTML = '<div class="text-center text-gray-400 py-12">No packages found.</div>';
        return;
      }

      list.innerHTML = pkgs.map(pkg => `
        <a href="/packages/${pkg.name}" class="package-card block border rounded-lg bg-white p-5 mb-3 hover:shadow-sm transition-all">
          <div class="flex items-start justify-between">
            <div>
              <span class="font-semibold text-indigo-700">${pkg.name}</span>
              <span class="ml-2 text-xs text-gray-400">by ${pkg.owner}</span>
            </div>
          </div>
          ${pkg.description ? `<p class="text-sm text-gray-600 mt-1">${pkg.description}</p>` : ''}
        </a>
      `).join('');
    });
  </script>
</body>
</html>
