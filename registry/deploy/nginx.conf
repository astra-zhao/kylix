# /etc/nginx/sites-available/packages.kylix.top — TLS reverse proxy.

upstream registry {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name packages.kylix.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name packages.kylix.top;

    ssl_certificate     /etc/letsencrypt/live/packages.kylix.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/packages.kylix.top/privkey.pem;

    location / {
        proxy_pass http://registry;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/packages/ {
        proxy_pass http://registry;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Stream tarball uploads without buffering.
        proxy_request_buffering off;
    }
}